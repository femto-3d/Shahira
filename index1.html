<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    padding:20px;
}

h1{
    font-size:120px;
    color:#fff;
    margin-bottom:10px;
}

p{
    font-size:22px;
    color:#aaa;
    margin-bottom:30px;
}

a{
    display:inline-block;
    padding:12px 30px;
    background:#fff;
    color:#000;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
    font-weight:bold;
}

a:hover{
    background:#444;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Oops! The page you are looking for doesn't exist.</p>
    <a href="/">Go Back Home</a>
</div>

</body>
</html>
