<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Shahira</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}


body{

background:#F6EFC7;
min-height:100vh;
display:flex;
flex-direction:column;
color:#2F3430;

}



/* NAVBAR */

nav{

height:90px;
background:#F9F5EA;
display:flex;
justify-content:center;
align-items:center;
border-bottom:2px solid #D4A94C;

}


.logo-img{

height:60px;
width:auto;

}




/* MAIN */

.container{

flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

}


.content{

text-align:center;
max-width:850px;

}


.error{

font-size:160px;
font-family:'Playfair Display';
font-weight:700;
color:#D4A94C;
line-height:1;

}


h1{

font-size:58px;
font-family:'Playfair Display';
margin:20px 0;

}


p{

font-size:23px;
line-height:1.8;
color:#555;
margin-bottom:45px;

}



.btn-group{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}



.btn{

background:#D4A94C;
padding:18px 38px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:17px;
font-weight:500;
transition:.3s;

}


.btn:hover{

background:#be9030;

}



.btn-outline{

background:transparent;
border:2px solid #D4A94C;
color:#2F3430;

}


.btn-outline:hover{

background:#D4A94C;
color:white;

}



.food-icons{

font-size:38px;
margin-bottom:25px;
opacity:.8;

}



.footer{

background:#F9F5EA;
padding:25px;
text-align:center;
font-size:16px;
color:#666;

}



/* MOBILE */

@media(max-width:768px){

.logo-img{

height:45px;

}


.error{

font-size:100px;

}


h1{

font-size:38px;

}


p{

font-size:18px;

}


.btn{

padding:15px 28px;
font-size:15px;

}

}

</style>

</head>


<body>



<!-- NAV -->

<nav>

<img
src="assets/img/shahira_logo.png"
class="logo-img"
alt="Shahira Indian Multi Cuisine Restaurant Scarborough">

</nav>




<!-- CONTENT -->

<div class="container">

<div class="content">


<div class="food-icons">

🍛 • 🌶️ • 🍽️

</div>



<div class="error">

404

</div>



<h1>

Oops! This dish isn’t on the menu

</h1>



<p>

Looks like the page you're craving<br>
has been moved, removed, or never existed.

</p>



<div class="btn-group">

<a href="/"
class="btn">

Back to Home

</a>



<a href="/menu"
class="btn btn-outline">

Explore Menu

</a>


</div>



</div>

</div>




<!-- FOOTER -->

<div class="footer">

Serving authentic flavours • Creating memorable experiences

</div>



</body>

</html>
